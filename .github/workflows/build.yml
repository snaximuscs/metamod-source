name: Build Metamod Source

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux Build (Steam Runtime sniper)
    runs-on: ubuntu-latest
    # Build inside the Steam Runtime "sniper" SDK (glibc 2.31) so the
    # resulting binaries load on CS2 dedicated servers. Building on the
    # runner's own toolchain produces GLIBC_2.38+ symbol dependencies.
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          git config --global --add safe.directory '*'
          apt-get update
          apt-get install -y \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            git \
            curl \
            ca-certificates

      - name: Install AMBuild
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ambuild || true
          if ! command -v ambuild >/dev/null 2>&1; then
            git clone https://github.com/alliedmodders/ambuild /tmp/ambuild
            cd /tmp/ambuild
            python3 setup.py install --user
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          which ambuild || true
          ambuild --version || true

      - name: Checkout Metamod dependencies (CS2 SDK only)
        run: |
          cd ..
          chmod +x metamod-source/support/checkout-deps.sh
          ./metamod-source/support/checkout-deps.sh -s cs2
          cd metamod-source

      - name: Fix SDK compiler warnings
        run: |
          grep -rl -- "-Wno-nontrivial-memcall" . --include="*.cpp" --include="*.h" --include="*.hpp" 2>/dev/null | xargs -r sed -i 's/-Wno-nontrivial-memcall/-Wno-nontrivial-memaccess/g'

      - name: Configure build (CS2 only)
        run: |
          mkdir -p build
          cd build
          python3 ../configure.py --sdks=cs2 --enable-optimize --targets=x86_64

      - name: Compile
        run: |
          cd build
          ambuild

      - name: Check glibc symbol versions
        run: |
          # Fail if any binary requires glibc newer than sniper's 2.31
          bad=0
          for so in $(find build -name '*.so'); do
            if objdump -T "$so" | grep -E 'GLIBC_2\.(3[2-9]|[4-9][0-9])' ; then
              echo "::error::$so requires glibc symbols newer than 2.31"
              bad=1
            fi
          done
          exit $bad

      - name: Verify no unresolved engine data symbols
        run: |
          so=build/package/addons/metamod/bin/linuxsteamrt64/metamod.2.cs2.so
          test -f "$so"
          # Data symbols must resolve at dlopen time; CS2's Linux tier0 no
          # longer exports g_bUpdateStringTokenDatabase, so it must not appear
          # as an undefined dynamic symbol in the core.
          if readelf -Ws "$so" | grep "UND" | grep -q "g_bUpdateStringTokenDatabase"; then
            echo "::error::metamod.2.cs2.so still has unresolved g_bUpdateStringTokenDatabase"
            readelf -Ws "$so" | grep "g_bUpdateStringTokenDatabase"
            exit 1
          fi
          echo "OK: g_bUpdateStringTokenDatabase is not an undefined dynamic symbol"
          echo "--- readelf dynamic symbol table entries ---"
          readelf -Ws "$so" | grep g_bUpdateStringTokenDatabase || true
          echo "--- nm -D dynamic symbol entries ---"
          nm -D "$so" | grep g_bUpdateStringTokenDatabase || true

      - name: Verify CS2 package contents
        run: |
          bindir=build/package/addons/metamod/bin/linuxsteamrt64
          # The engine loads the loader (libserver.so) first, then the loader
          # loads metamod.2.cs2.so; both must ship together or the server
          # crashes at CAppSystemDict module load (see error.txt).
          test -f "$bindir/metamod.2.cs2.so"
          test -f "$bindir/libserver.so"
          if [ -f "$bindir/metamod.2.dota.so" ]; then
            echo "::error::metamod.2.dota.so must not be in the CS2 package"
            exit 1
          fi
          # Informational: list unresolved data (OBJECT) symbols. These must
          # be exported by libc/libstdc++/tier0 at runtime or dlopen aborts —
          # exactly how g_bUpdateStringTokenDatabase broke. Review on failure.
          for so in "$bindir/metamod.2.cs2.so" "$bindir/libserver.so"; do
            echo "--- undefined data symbols in $so ---"
            readelf -Ws "$so" | grep "UND" | awk '$4 == "OBJECT"' || true
          done
          ls -lah "$bindir/"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: metamod-source-cs2-linuxsteamrt64
          path: build/package/**
          if-no-files-found: error
