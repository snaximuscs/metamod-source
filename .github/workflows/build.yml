name: Build Metamod Source

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux Build (Steam Runtime sniper)
    runs-on: ubuntu-latest
    # Build inside the Steam Runtime "sniper" SDK (glibc 2.31) so the
    # resulting binaries load on CS2 dedicated servers. Building on the
    # runner's own toolchain produces GLIBC_2.38+ symbol dependencies.
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          git config --global --add safe.directory '*'
          apt-get update
          apt-get install -y \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            git \
            curl \
            ca-certificates

      - name: Install AMBuild
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ambuild || true
          if ! command -v ambuild >/dev/null 2>&1; then
            git clone https://github.com/alliedmodders/ambuild /tmp/ambuild
            cd /tmp/ambuild
            python3 setup.py install --user
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          which ambuild || true
          ambuild --version || true

      - name: Checkout Metamod dependencies
        run: |
          cd ..
          chmod +x metamod-source/support/checkout-deps.sh
          ./metamod-source/support/checkout-deps.sh
          cd metamod-source

      - name: Fix SDK compiler warnings
        run: |
          grep -rl -- "-Wno-nontrivial-memcall" . --include="*.cpp" --include="*.h" --include="*.hpp" 2>/dev/null | xargs -r sed -i 's/-Wno-nontrivial-memcall/-Wno-nontrivial-memaccess/g'

      - name: Configure build
        run: |
          mkdir -p build
          cd build
          python3 ../configure.py --targets=x86_64

      - name: Compile
        run: |
          cd build
          ambuild

      - name: Check glibc symbol versions
        run: |
          # Fail if any binary requires glibc newer than sniper's 2.31
          bad=0
          for so in $(find build -name '*.so'); do
            if objdump -T "$so" | grep -E 'GLIBC_2\.(3[2-9]|[4-9][0-9])' ; then
              echo "::error::$so requires glibc symbols newer than 2.31"
              bad=1
            fi
          done
          exit $bad

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1st-mn-metamod-source-linux
          path: |
            build/package/**
            build/**/*.so
            build/**/*.vdf
            build/**/*.tar.gz
          if-no-files-found: warn
